<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEAD ZONE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ─── Canvas Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// ─── Game States ────────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3, INSTRUCTIONS: 4, HIGHSCORES: 5 };
let gameState = STATE.MENU;

// ─── Audio ──────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol = 0.3, startFreq = null) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type;
    if (startFreq) {
      osc.frequency.setValueAtTime(startFreq, ac.currentTime);
      osc.frequency.linearRampToValueAtTime(freq, ac.currentTime + duration);
    } else {
      osc.frequency.setValueAtTime(freq, ac.currentTime);
    }
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

function sfxShoot() {
  playTone(800, 'square', 0.08, 0.2, 1200);
  setTimeout(() => playTone(400, 'square', 0.06, 0.1), 40);
}
function sfxHurt() { playTone(200, 'sawtooth', 0.3, 0.25, 600); }
function sfxEnemyDie() {
  playTone(300, 'sawtooth', 0.15, 0.2, 500);
  setTimeout(() => playTone(150, 'sawtooth', 0.15, 0.15, 300), 100);
}
function sfxReload() {
  [220, 330, 440].forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.1, 0.2), i * 80));
}
function sfxLevelUp() {
  [261, 329, 392].forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.15, 0.25), i * 100));
}
function sfxMenuNav() { playTone(440, 'triangle', 0.08, 0.15); }
function sfxClick() { playTone(660, 'triangle', 0.1, 0.2); }
function sfxPickup() {
  [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.12, 0.3), i * 60));
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
const mouse = { x: W / 2, y: H / 2, down: false };

document.addEventListener('keydown', e => {
  if (!keys[e.code]) {
    keys[e.code] = true;
    handleKeyPress(e.code);
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width, scaleY = H / r.height;
  mouse.x = (e.clientX - r.left) * scaleX;
  mouse.y = (e.clientY - r.top) * scaleY;
});
canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  if (gameState === STATE.MENU || gameState === STATE.INSTRUCTIONS || gameState === STATE.HIGHSCORES) {
    handleMenuClick();
  }
});
canvas.addEventListener('mouseup', () => { mouse.down = false; });

// ─── Level Definitions ───────────────────────────────────────────────────────
const LEVELS = [
  { message: 'Level 1', waves: [
    { count: 5, types: ['grunt'], interval: 1.5 },
    { count: 7, types: ['grunt'], interval: 1.2 },
  ]},
  { message: 'Level 2', waves: [
    { count: 6, types: ['grunt', 'rusher'], interval: 1.3 },
    { count: 8, types: ['grunt', 'rusher'], interval: 1.0 },
    { count: 5, types: ['rusher', 'shooter'], interval: 1.2 },
  ]},
  { message: 'Level 3', waves: [
    { count: 8, types: ['grunt', 'rusher', 'shooter'], interval: 1.0 },
    { count: 6, types: ['tank', 'shooter'], interval: 1.5 },
    { count: 10, types: ['grunt', 'rusher', 'tank'], interval: 0.8 },
  ]},
  { message: 'Level 4', waves: [
    { count: 10, types: ['rusher', 'shooter', 'tank'], interval: 0.9 },
    { count: 12, types: ['grunt', 'rusher', 'shooter'], interval: 0.7 },
    { count: 8, types: ['tank', 'shooter'], interval: 1.2 },
  ]},
  { message: 'Level 5 — FINAL', waves: [
    { count: 12, types: ['grunt', 'rusher', 'tank', 'shooter'], interval: 0.8 },
    { count: 15, types: ['rusher', 'shooter', 'tank'], interval: 0.6 },
    { count: 10, types: ['tank', 'shooter', 'rusher'], interval: 0.7 },
    { count: 20, types: ['grunt', 'rusher', 'tank', 'shooter'], interval: 0.5 },
  ]},
];

// ─── Enemy Configs ────────────────────────────────────────────────────────────
const ENEMY_CONFIGS = {
  grunt:   { color: '#cc2222', hp: 30,  speed: 80,  radius: 14, score: 10 },
  rusher:  { color: '#e07800', hp: 15,  speed: 160, radius: 11, score: 15 },
  tank:    { color: '#2a6a2a', hp: 120, speed: 40,  radius: 22, score: 30 },
  shooter: { color: '#8822cc', hp: 20,  speed: 50,  radius: 12, score: 20 },
};

// ─── Game Variables ───────────────────────────────────────────────────────────
let player, enemies, bullets, particles, pickups;
let score, highScore;
let currentLevel, currentWave;
let waveTimer, waveBreak, waveBreakTimer;
let spawnQueue, spawnTimer;
let levelCompleteTimer, levelCompleteLock;
let gameOverReady;
let menuOption = 0;
const MENU_OPTIONS = ['START GAME', 'INSTRUCTIONS', 'HIGH SCORES'];
let shootCooldown = 0;

// ─── Utility ──────────────────────────────────────────────────────────────────
function rnd(a, b) { return a + Math.random() * (b - a); }
function rndInt(a, b) { return Math.floor(rnd(a, b + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx*dx + dy*dy; }
function circle(ax, ay, ar, bx, by, br) { return dist2(ax, ay, bx, by) < (ar + br) * (ar + br); }

function spawnEdgePos() {
  const side = rndInt(0, 3);
  switch(side) {
    case 0: return { x: rnd(0, W), y: -30 };
    case 1: return { x: rnd(0, W), y: H + 30 };
    case 2: return { x: -30, y: rnd(0, H) };
    case 3: return { x: W + 30, y: rnd(0, H) };
  }
}

// ─── Player ───────────────────────────────────────────────────────────────────
function createPlayer() {
  return {
    x: W / 2, y: H / 2,
    vx: 0, vy: 0,
    hp: 100, maxHp: 100,
    radius: 14,
    angle: 0,
    ammo: 30, maxAmmo: 30,
    reloading: false,
    reloadTimer: 0,
    reloadDuration: 1.5,
    iframes: 0,
    muzzleFlash: 0,
    walkFrame: 0,
    walkTimer: 0,
    speed: 180,
    bulletDamage: 20,
    fireRate: 0.15,
    shootTimer: 0,
  };
}

function updatePlayer(dt) {
  // Aim
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len > 0) { dx /= len; dy /= len; }

  player.vx = dx * player.speed;
  player.vy = dy * player.speed;
  player.x = clamp(player.x + player.vx * dt, player.radius, W - player.radius);
  player.y = clamp(player.y + player.vy * dt, player.radius, H - player.radius);

  // Walk animation
  if (len > 0) {
    player.walkTimer += dt;
    if (player.walkTimer > 0.12) { player.walkTimer = 0; player.walkFrame = (player.walkFrame + 1) % 4; }
  } else {
    player.walkFrame = 0;
  }

  // Reload
  if (player.reloading) {
    player.reloadTimer += dt;
    if (player.reloadTimer >= player.reloadDuration) {
      player.ammo = player.maxAmmo;
      player.reloading = false;
      player.reloadTimer = 0;
    }
  }

  // Shoot
  player.shootTimer -= dt;
  player.muzzleFlash -= dt;

  if (mouse.down && !player.reloading && player.ammo > 0 && player.shootTimer <= 0) {
    spawnPlayerBullet();
    player.ammo--;
    player.shootTimer = player.fireRate;
    player.muzzleFlash = 0.05;
    sfxShoot();
    if (player.ammo === 0) startReload();
  }

  // Manual reload
  if (keys['KeyR'] && !player.reloading && player.ammo < player.maxAmmo) startReload();

  // I-frames
  if (player.iframes > 0) player.iframes -= dt;
}

function startReload() {
  if (player.reloading || player.ammo === player.maxAmmo) return;
  player.reloading = true;
  player.reloadTimer = 0;
  sfxReload();
}

function drawPlayer() {
  const { x, y, angle, walkFrame, iframes, muzzleFlash } = player;

  // Flash when taking damage
  if (iframes > 0 && Math.floor(iframes * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(2, 6, 12, 6, 0, 0, Math.PI * 2); ctx.fill();

  // Legs (walk animation)
  const legOffset = [4, 2, 0, -2][walkFrame];
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(-5, 6, 4, 8 + legOffset);
  ctx.fillRect(1, 6, 4, 8 - legOffset);

  // Torso
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(-8, -4, 16, 12);

  // Head
  ctx.fillStyle = '#c8a070';
  ctx.beginPath(); ctx.arc(0, -8, 8, 0, Math.PI * 2); ctx.fill();

  // Eyes direction (follows aim angle)
  const eyeAng = angle;
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(Math.cos(eyeAng)*4, -8 + Math.sin(eyeAng)*4, 2, 0, Math.PI*2); ctx.fill();

  // Gun arm (rotates with aim)
  ctx.save();
  ctx.rotate(angle);
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(0, -3, 18, 6); // arm
  ctx.fillStyle = '#555';
  ctx.fillRect(14, -2, 12, 4); // barrel

  // Muzzle flash
  if (muzzleFlash > 0) {
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(26, -5, 8, 10);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(28, -3, 4, 6);
  }
  ctx.restore();

  ctx.restore();
}

// ─── Bullets ─────────────────────────────────────────────────────────────────
function spawnPlayerBullet() {
  const barrelLen = 30;
  const bx = player.x + Math.cos(player.angle) * barrelLen;
  const by = player.y + Math.sin(player.angle) * barrelLen;
  bullets.push({
    x: bx, y: by,
    vx: Math.cos(player.angle) * 550,
    vy: Math.sin(player.angle) * 550,
    radius: 4,
    damage: player.bulletDamage,
    fromPlayer: true,
    life: 1.5,
  });

  // Shell casing
  const casingAngle = player.angle - Math.PI / 2;
  particles.push({
    x: player.x + Math.cos(casingAngle) * 10,
    y: player.y + Math.sin(casingAngle) * 10,
    vx: Math.cos(casingAngle) * rnd(60, 100),
    vy: Math.sin(casingAngle) * rnd(60, 100) - 50,
    w: 6, h: 3,
    gravity: 200,
    color: '#ddaa00',
    alpha: 1,
    decay: 1.5,
    isCasing: true,
    rot: rnd(0, Math.PI * 2),
  });
}

function spawnEnemyBullet(enemy) {
  const spd = 220;
  const ang = Math.atan2(player.y - enemy.y, player.x - enemy.x);
  bullets.push({
    x: enemy.x + Math.cos(ang) * (enemy.radius + 5),
    y: enemy.y + Math.sin(ang) * (enemy.radius + 5),
    vx: Math.cos(ang) * spd,
    vy: Math.sin(ang) * spd,
    radius: 5,
    damage: 15,
    fromPlayer: false,
    life: 2.0,
  });
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1); continue;
    }

    if (b.fromPlayer) {
      // vs enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (circle(b.x, b.y, b.radius, e.x, e.y, e.radius)) {
          e.hp -= b.damage;
          spawnHitParticles(b.x, b.y, 'blood', e.color);
          bullets.splice(i, 1);
          if (e.hp <= 0) killEnemy(j);
          break;
        }
      }
    } else {
      // vs player
      if (player.iframes <= 0 && circle(b.x, b.y, b.radius, player.x, player.y, player.radius)) {
        damagePlayer(b.damage);
        spawnHitParticles(b.x, b.y, 'spark', '#ff8800');
        bullets.splice(i, 1);
      }
    }
  }
}

function drawBullets() {
  for (const b of bullets) {
    if (b.fromPlayer) {
      ctx.fillStyle = '#ffee00';
      ctx.shadowColor = '#ffee00';
      ctx.shadowBlur = 8;
    } else {
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 6;
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ─── Enemies ──────────────────────────────────────────────────────────────────
function createEnemy(type, x, y) {
  const cfg = ENEMY_CONFIGS[type];
  return {
    type, x, y,
    hp: cfg.hp, maxHp: cfg.hp,
    speed: cfg.speed,
    radius: cfg.radius,
    color: cfg.color,
    score: cfg.score,
    dropsHeart: type === 'rusher' && Math.random() < 1/5,
    walkFrame: 0,
    walkTimer: 0,
    shootTimer: rnd(1, 3),
    weaveTimer: 0,
    weaveOffset: rnd(0, Math.PI * 2),
    dying: false,
    dyingTimer: 0,
    alpha: 1,
    angle: 0,
  };
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    if (e.dying) {
      e.dyingTimer += dt;
      e.alpha = Math.max(0, 1 - e.dyingTimer / 0.6);
      if (e.dyingTimer >= 0.6) enemies.splice(i, 1);
      continue;
    }

    const dx = player.x - e.x, dy = player.y - e.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    e.angle = Math.atan2(dy, dx);

    let moveX = 0, moveY = 0;

    switch(e.type) {
      case 'grunt':
        moveX = (dx / d) * e.speed;
        moveY = (dy / d) * e.speed;
        break;

      case 'rusher':
        e.weaveTimer += dt;
        const perpX = -dy / d, perpY = dx / d;
        const weave = Math.sin(e.weaveTimer * 4 + e.weaveOffset) * 80;
        moveX = (dx / d) * e.speed + perpX * weave;
        moveY = (dy / d) * e.speed + perpY * weave;
        break;

      case 'tank':
        moveX = (dx / d) * e.speed;
        moveY = (dy / d) * e.speed;
        break;

      case 'shooter':
        if (d > 200) {
          moveX = (dx / d) * e.speed;
          moveY = (dy / d) * e.speed;
        } else if (d < 120) {
          moveX = -(dx / d) * e.speed * 0.5;
          moveY = -(dy / d) * e.speed * 0.5;
        }
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && d <= 250) {
          spawnEnemyBullet(e);
          e.shootTimer = rnd(1.2, 2.5);
        }
        break;
    }

    e.x = clamp(e.x + moveX * dt, e.radius, W - e.radius);
    e.y = clamp(e.y + moveY * dt, e.radius, H - e.radius);

    // Walk animation
    e.walkTimer += dt;
    if (e.walkTimer > 0.12) { e.walkTimer = 0; e.walkFrame = (e.walkFrame + 1) % 4; }

    // Body vs player collision
    if (player.iframes <= 0 && circle(e.x, e.y, e.radius, player.x, player.y, player.radius)) {
      damagePlayer(e.type === 'tank' ? 25 : 15);
    }
  }
}

function killEnemy(idx) {
  const e = enemies[idx];
  score += e.score;
  spawnDeathParticles(e.x, e.y, e.color);
  sfxEnemyDie();
  if (e.dropsHeart) {
    pickups.push({ x: e.x, y: e.y, radius: 10, bob: 0, life: 8 });
  }
  e.dying = true;
  e.dyingTimer = 0;
}

function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    ctx.globalAlpha = e.alpha;
    ctx.translate(e.x, e.y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(2, e.radius * 0.6, e.radius * 0.9, e.radius * 0.4, 0, 0, Math.PI * 2); ctx.fill();

    const legOff = [3, 1, -1, -3][e.walkFrame];

    if (e.type === 'tank') {
      // Larger blocky tank
      ctx.fillStyle = '#1a4a1a';
      ctx.fillRect(-16, -10, 8, 14 + legOff);
      ctx.fillRect(8, -10, 8, 14 - legOff);
      ctx.fillStyle = e.color;
      ctx.fillRect(-14, -16, 28, 22);
      ctx.fillStyle = '#555';
      ctx.fillRect(-6, -20, 12, 8);
      // HP bar above tank
    } else {
      // Standard enemy body
      ctx.fillStyle = e.color;
      const lc = e.color + 'aa';
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(-5, 4, 4, 8 + legOff);
      ctx.fillRect(1, 4, 4, 8 - legOff);
      ctx.fillStyle = e.color;
      ctx.fillRect(-8, -4, 16, 10);
      ctx.fillStyle = lighten(e.color);
      ctx.beginPath(); ctx.arc(0, -8, 7, 0, Math.PI * 2); ctx.fill();
      // Eyes
      const eyeAngle = e.angle;
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(Math.cos(eyeAngle)*3, -8 + Math.sin(eyeAngle)*3, 1.5, 0, Math.PI*2); ctx.fill();
    }

    // HP bar
    const hpFrac = e.hp / e.maxHp;
    if (hpFrac < 1) {
      const bw = e.radius * 2;
      const by = -e.radius - 8;
      ctx.fillStyle = '#400';
      ctx.fillRect(-bw/2, by, bw, 4);
      ctx.fillStyle = hpFrac > 0.5 ? '#0f0' : hpFrac > 0.25 ? '#fa0' : '#f00';
      ctx.fillRect(-bw/2, by, bw * hpFrac, 4);
    }

    ctx.restore();
  }
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const f = n => Math.min(255, n + 60).toString(16).padStart(2,'0');
  return `#${f(r)}${f(g)}${f(b)}`;
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnHitParticles(x, y, type, color) {
  const count = rndInt(8, 12);
  for (let i = 0; i < count; i++) {
    const ang = rnd(0, Math.PI * 2);
    const spd = rnd(60, 200);
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      radius: rnd(2, 5),
      color: type === 'blood' ? (color || '#cc0000') : '#ffcc00',
      alpha: 1,
      decay: rnd(2, 4),
      gravity: 0,
      isCasing: false,
    });
  }
}

function spawnDeathParticles(x, y, color) {
  for (let i = 0; i < 20; i++) {
    const ang = rnd(0, Math.PI * 2);
    const spd = rnd(80, 280);
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      radius: rnd(3, 8),
      w: rnd(4, 10), h: rnd(4, 10),
      color,
      alpha: 1,
      decay: rnd(1.5, 3),
      gravity: 50,
      isCasing: false,
      isRect: true,
      rot: rnd(0, Math.PI * 2),
      rotSpeed: rnd(-5, 5),
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity || 0) * dt;
    p.alpha -= p.decay * dt;
    if (p.rot !== undefined) p.rot += (p.rotSpeed || 0) * dt;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    if (p.isCasing || p.isRect) {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot || 0);
      ctx.fillStyle = p.color;
      ctx.fillRect(-(p.w||6)/2, -(p.h||3)/2, p.w||6, p.h||3);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ─── Pickups ──────────────────────────────────────────────────────────────────
function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.bob += dt;
    p.life -= dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    if (circle(p.x, p.y, p.radius, player.x, player.y, player.radius)) {
      player.hp = Math.min(player.maxHp, player.hp + 25);
      sfxPickup();
      spawnHitParticles(p.x, p.y, 'spark', '#ff4488');
      pickups.splice(i, 1);
    }
  }
}

function drawPickups() {
  for (const p of pickups) {
    const y = p.y + Math.sin(p.bob * 3) * 4;
    // Fade out in last 2 seconds
    const alpha = p.life < 2 ? p.life / 2 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, y);

    // Glow
    ctx.shadowColor = '#ff4488';
    ctx.shadowBlur = 12;

    // Heart shape using bezier curves (scaled to radius ~10)
    ctx.fillStyle = '#ff2266';
    ctx.beginPath();
    ctx.moveTo(0, 4);
    ctx.bezierCurveTo(-10, -4, -10, -12, 0, -8);
    ctx.bezierCurveTo(10, -12, 10, -4, 0, 4);
    ctx.fill();

    // Highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,180,210,0.5)';
    ctx.beginPath();
    ctx.ellipse(-3, -8, 3, 2, -0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ─── Damage ───────────────────────────────────────────────────────────────────
function damagePlayer(amount) {
  player.hp -= amount;
  player.iframes = 0.7;
  sfxHurt();
  spawnHitParticles(player.x, player.y, 'spark', '#ff8800');
  if (player.hp <= 0) {
    player.hp = 0;
    endGame();
  }
}

// ─── Wave / Level System ─────────────────────────────────────────────────────
function startGame() {
  player = createPlayer();
  enemies = [];
  bullets = [];
  particles = [];
  pickups = [];
  score = 0;
  currentLevel = 0;
  currentWave = 0;
  waveBreak = false;
  waveBreakTimer = 0;
  spawnQueue = [];
  spawnTimer = 0;
  gameState = STATE.PLAYING;
  startWave();
}

function startWave() {
  const level = LEVELS[currentLevel];
  const wave = level.waves[currentWave];
  spawnQueue = [];
  for (let i = 0; i < wave.count; i++) {
    const type = wave.types[rndInt(0, wave.types.length - 1)];
    spawnQueue.push({ type, delay: i * wave.interval });
  }
  spawnTimer = 0;
  waveBreak = false;
}

function updateWave(dt) {
  if (waveBreak) {
    waveBreakTimer -= dt;
    if (waveBreakTimer <= 0) {
      currentWave++;
      const level = LEVELS[currentLevel];
      if (currentWave >= level.waves.length) {
        // Level complete
        if (currentLevel + 1 >= LEVELS.length) {
          // Won the game!
          levelCompleteTimer = 0;
          levelCompleteLock = true;
          setTimeout(() => levelCompleteLock = false, 500);
          gameState = STATE.LEVEL_COMPLETE;
          sfxLevelUp();
        } else {
          levelCompleteTimer = 0;
          levelCompleteLock = true;
          setTimeout(() => levelCompleteLock = false, 500);
          gameState = STATE.LEVEL_COMPLETE;
          sfxLevelUp();
        }
      } else {
        startWave();
      }
    }
    return;
  }

  // Spawn from queue
  spawnTimer += dt;
  while (spawnQueue.length > 0 && spawnTimer >= spawnQueue[0].delay) {
    const item = spawnQueue.shift();
    const pos = spawnEdgePos();
    enemies.push(createEnemy(item.type, pos.x, pos.y));
  }

  // Check wave clear
  if (spawnQueue.length === 0) {
    const aliveNonDying = enemies.filter(e => !e.dying);
    if (aliveNonDying.length === 0) {
      waveBreak = true;
      waveBreakTimer = 3.0;
    }
  }
}

function nextLevel() {
  currentLevel++;
  currentWave = 0;
  enemies = [];
  bullets = [];
  pickups = [];
  // Heal player a bit
  player.hp = Math.min(player.maxHp, player.hp + 30);
  player.ammo = player.maxAmmo;
  player.reloading = false;
  gameState = STATE.PLAYING;
  startWave();
}

function endGame() {
  const saved = parseInt(localStorage.getItem('dzHighScore') || '0');
  if (score > saved) localStorage.setItem('dzHighScore', String(score));
  highScore = Math.max(score, saved);
  gameOverReady = false;
  setTimeout(() => gameOverReady = true, 1000);
  gameState = STATE.GAME_OVER;
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  const pad = 14;

  // HP Bar
  const hpW = 160, hpH = 18;
  const hpFrac = player.hp / player.maxHp;
  ctx.fillStyle = '#111';
  ctx.fillRect(pad, pad, hpW, hpH);
  const hpColor = hpFrac > 0.5 ? '#33ff33' : hpFrac > 0.25 ? '#ffaa00' : '#ff2222';
  ctx.fillStyle = hpColor;
  ctx.fillRect(pad, pad, hpW * hpFrac, hpH);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(pad, pad, hpW, hpH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(`HP  ${player.hp}/${player.maxHp}`, pad + 4, pad + 13);

  // Ammo
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px monospace';
  if (player.reloading) {
    const blink = Math.floor(Date.now() / 300) % 2 === 0;
    ctx.fillStyle = blink ? '#ffff00' : '#886600';
    ctx.fillText('RELOADING...', pad, pad + hpH + 18);
  } else {
    ctx.fillStyle = '#fff';
    ctx.fillText(`AMMO  ${player.ammo}/${player.maxAmmo}`, pad, pad + hpH + 18);
  }

  // Reload bar
  if (player.reloading) {
    const rFrac = player.reloadTimer / player.reloadDuration;
    ctx.fillStyle = '#333';
    ctx.fillRect(pad, pad + hpH + 22, hpW, 6);
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(pad, pad + hpH + 22, hpW * rFrac, 6);
  }

  // Score (center)
  const scoreStr = String(score).padStart(8, '0');
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(scoreStr, W / 2, pad + 20);
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('SCORE', W / 2, pad + 34);
  ctx.textAlign = 'left';

  // Level / Wave (top right)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  const lvlName = LEVELS[currentLevel]?.message || 'FINAL';
  ctx.fillText(lvlName, W - pad, pad + 14);
  ctx.fillStyle = '#aaa';
  ctx.font = '12px monospace';
  const totalWaves = LEVELS[currentLevel]?.waves.length || 0;
  ctx.fillText(`WAVE ${currentWave + 1}/${totalWaves}`, W - pad, pad + 30);
  ctx.textAlign = 'left';

  // Wave break countdown
  if (waveBreak) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffff';
    ctx.font = 'bold 18px monospace';
    ctx.fillText(`NEXT WAVE IN ${Math.ceil(waveBreakTimer)}s`, W / 2, H / 2 - 30);
    ctx.textAlign = 'left';
  }
}

// ─── Background ───────────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#111118';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = 0; x <= W; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }
}

// ─── Menu ─────────────────────────────────────────────────────────────────────
function drawMenu() {
  // Background
  ctx.fillStyle = '#070710';
  ctx.fillRect(0, 0, W, H);

  // Scanlines
  drawScanlines();

  // Animated dots/particles in background
  const t = Date.now() / 1000;
  for (let i = 0; i < 30; i++) {
    const x = (Math.sin(i * 1.7 + t * 0.3) * 0.5 + 0.5) * W;
    const y = (Math.cos(i * 2.3 + t * 0.2) * 0.5 + 0.5) * H;
    ctx.fillStyle = `rgba(80,80,200,${0.3 + Math.sin(i + t) * 0.2})`;
    ctx.fillRect(x, y, 2, 2);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 72px monospace';
  const grd = ctx.createLinearGradient(0, 100, 0, 180);
  grd.addColorStop(0, '#ff4444');
  grd.addColorStop(1, '#aa0000');
  ctx.fillStyle = grd;
  ctx.fillText('DEAD ZONE', W / 2, 160);

  // Subtitle
  ctx.font = '16px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('TOP-DOWN SHOOTER', W / 2, 185);

  // Options
  MENU_OPTIONS.forEach((opt, i) => {
    const y = 280 + i * 55;
    const selected = menuOption === i;
    if (selected) {
      ctx.fillStyle = 'rgba(255,50,50,0.15)';
      ctx.fillRect(W/2 - 160, y - 28, 320, 42);
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.strokeRect(W/2 - 160, y - 28, 320, 42);
    }
    ctx.font = `bold ${selected ? 22 : 18}px monospace`;
    ctx.fillStyle = selected ? '#ff4444' : '#888';
    ctx.fillText(opt, W / 2, y);
  });

  // High score
  const hs = localStorage.getItem('dzHighScore') || '0';
  ctx.font = '14px monospace';
  ctx.fillStyle = '#444';
  ctx.fillText(`HIGH SCORE: ${String(hs).padStart(8,'0')}`, W / 2, H - 40);

  ctx.font = '12px monospace';
  ctx.fillStyle = '#333';
  ctx.fillText('↑↓ to navigate   ENTER / CLICK to select', W / 2, H - 20);

  ctx.textAlign = 'left';
}

function drawInstructions() {
  ctx.fillStyle = '#070710';
  ctx.fillRect(0, 0, W, H);
  drawScanlines();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('HOW TO PLAY', W / 2, 70);

  const lines = [
    ['MOVE', 'ARROW KEYS or WASD'],
    ['AIM', 'MOUSE'],
    ['SHOOT', 'LEFT CLICK (hold to fire)'],
    ['RELOAD', 'R KEY (auto on empty)'],
    ['', ''],
    ['ENEMIES', ''],
    ['■ RED GRUNT', 'Standard, moves straight at you'],
    ['■ ORANGE RUSHER', 'Fast with zigzag movement'],
    ['■ GREEN TANK', 'Slow but extremely tough'],
    ['■ PURPLE SHOOTER', 'Keeps distance and fires back'],
    ['', ''],
    ['Survive all waves to advance levels.'],
    ['Your HP carries over — use it wisely.'],
  ];

  ctx.font = '14px monospace';
  lines.forEach((line, i) => {
    const y = 110 + i * 26;
    if (Array.isArray(line) && line[0]) {
      ctx.textAlign = 'right';
      ctx.fillStyle = line[0].startsWith('■') ? (
        line[0].includes('RED') ? '#cc2222' :
        line[0].includes('ORANGE') ? '#e07800' :
        line[0].includes('GREEN') ? '#2a6a2a' : '#8822cc'
      ) : '#ffaa00';
      ctx.fillText(line[0], W / 2 - 10, y);
      ctx.textAlign = 'left';
      ctx.fillStyle = '#ccc';
      ctx.fillText(line[1], W / 2 + 10, y);
    } else {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#aaa';
      ctx.fillText(Array.isArray(line) ? line[0] : line, W / 2, y);
    }
  });

  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '14px monospace';
  ctx.fillText('ESC or BACKSPACE to return', W / 2, H - 20);
  ctx.textAlign = 'left';
}

function drawHighScores() {
  ctx.fillStyle = '#070710';
  ctx.fillRect(0, 0, W, H);
  drawScanlines();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('HIGH SCORES', W / 2, 90);

  const hs = localStorage.getItem('dzHighScore') || '0';
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 40px monospace';
  ctx.fillText(String(hs).padStart(8, '0'), W / 2, 180);

  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('PERSONAL BEST', W / 2, 210);

  ctx.fillStyle = '#444';
  ctx.font = '14px monospace';
  ctx.fillText('ESC or BACKSPACE to return', W / 2, H - 20);
  ctx.textAlign = 'left';
}

function drawLevelComplete() {
  // Game still visible behind
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  const isLastLevel = currentLevel >= LEVELS.length - 1;
  const t = levelCompleteTimer || 0;

  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 48px monospace';
  ctx.fillText(isLastLevel ? 'YOU WIN!' : 'LEVEL CLEAR!', W / 2, H / 2 - 60);

  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.fillText(LEVELS[currentLevel]?.message + ' Complete', W / 2, H / 2 - 10);

  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`SCORE: ${String(score).padStart(8, '0')}`, W / 2, H / 2 + 35);

  if (!levelCompleteLock) {
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    ctx.fillStyle = blink ? '#fff' : '#888';
    ctx.font = '18px monospace';
    ctx.fillText(isLastLevel ? 'PRESS ENTER to return to menu' : 'PRESS ENTER to continue', W / 2, H / 2 + 90);
  }

  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff2222';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 80);

  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`SCORE: ${String(score).padStart(8, '0')}`, W / 2, H / 2 - 10);

  ctx.fillStyle = '#888';
  ctx.font = '18px monospace';
  ctx.fillText(`HIGH SCORE: ${String(highScore).padStart(8, '0')}`, W / 2, H / 2 + 30);

  if (score >= highScore && highScore > 0) {
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 60);
  }

  if (gameOverReady) {
    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.fillText('[R] RESTART    [M] MENU', W / 2, H / 2 + 110);
  }

  ctx.textAlign = 'left';
}

// ─── Input Handlers ───────────────────────────────────────────────────────────
function handleKeyPress(code) {
  if (gameState === STATE.MENU) {
    if (code === 'ArrowUp' || code === 'KeyW') {
      menuOption = (menuOption - 1 + MENU_OPTIONS.length) % MENU_OPTIONS.length;
      sfxMenuNav();
    } else if (code === 'ArrowDown' || code === 'KeyS') {
      menuOption = (menuOption + 1) % MENU_OPTIONS.length;
      sfxMenuNav();
    } else if (code === 'Enter' || code === 'Space') {
      activateMenuOption();
    }
  } else if (gameState === STATE.INSTRUCTIONS || gameState === STATE.HIGHSCORES) {
    if (code === 'Escape' || code === 'Backspace' || code === 'Enter') {
      gameState = STATE.MENU;
    }
  } else if (gameState === STATE.LEVEL_COMPLETE) {
    if (!levelCompleteLock && code === 'Enter') {
      const isLastLevel = currentLevel >= LEVELS.length - 1;
      if (isLastLevel) {
        endGame();
      } else {
        nextLevel();
      }
    }
  } else if (gameState === STATE.GAME_OVER) {
    if (gameOverReady) {
      if (code === 'KeyR') startGame();
      else if (code === 'KeyM') { gameState = STATE.MENU; menuOption = 0; }
    }
  }
}

function handleMenuClick() {
  // Check if mouse over an option
  MENU_OPTIONS.forEach((opt, i) => {
    const y = 280 + i * 55;
    if (mouse.y >= y - 28 && mouse.y <= y + 14 && mouse.x >= W/2 - 160 && mouse.x <= W/2 + 160) {
      menuOption = i;
      activateMenuOption();
    }
  });
}

function activateMenuOption() {
  sfxClick();
  if (menuOption === 0) startGame();
  else if (menuOption === 1) gameState = STATE.INSTRUCTIONS;
  else if (menuOption === 2) gameState = STATE.HIGHSCORES;
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);

  if (gameState === STATE.MENU) {
    drawMenu();
  } else if (gameState === STATE.INSTRUCTIONS) {
    drawInstructions();
  } else if (gameState === STATE.HIGHSCORES) {
    drawHighScores();
  } else if (gameState === STATE.PLAYING) {
    drawBackground();
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateParticles(dt);
    updatePickups(dt);
    updateWave(dt);
    drawParticles();
    drawPickups();
    drawBullets();
    drawEnemies();
    drawPlayer();
    drawScanlines();
    drawHUD();
  } else if (gameState === STATE.LEVEL_COMPLETE) {
    drawBackground();
    drawParticles();
    drawBullets();
    drawEnemies();
    drawPlayer();
    drawScanlines();
    drawHUD();
    drawLevelComplete();
    levelCompleteTimer = (levelCompleteTimer || 0) + dt;
  } else if (gameState === STATE.GAME_OVER) {
    drawBackground();
    drawGameOver();
    drawScanlines();
  }

  requestAnimationFrame(loop);
}

// ─── Scale canvas to window ───────────────────────────────────────────────────
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
window.addEventListener('resize', resize);
resize();

// ─── Init ─────────────────────────────────────────────────────────────────────
highScore = parseInt(localStorage.getItem('dzHighScore') || '0');
requestAnimationFrame(loop);
</script>
