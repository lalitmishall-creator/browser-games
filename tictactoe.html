<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #a0c4ff; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(160, 196, 255, 0.5);
    }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #a0c4ff;
      background: transparent;
      color: #a0c4ff;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #restart:hover {
      background: #a0c4ff;
      color: #1a1a2e;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score span { color: #ff6b6b; }
    .score-box.o-score span { color: #a0c4ff; }
    .score-box.tie-score span { color: #ccc; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="score">
  <div class="score-box x-score">X <span id="score-x">0</span></div>
  <div class="score-box tie-score">Ties <span id="score-tie">0</span></div>
  <div class="score-box o-score">O <span id="score-o">0</span></div>
</div>

<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<button id="restart">Restart</button>

<script>
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const restartBtn = document.getElementById('restart');
  const scoreX = document.getElementById('score-x');
  const scoreO = document.getElementById('score-o');
  const scoreTie = document.getElementById('score-tie');

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, current, gameOver, scores = {X:0, O:0, T:0};

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "X's turn";
  }

  function checkWinner() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a,b,c] };
      }
    }
    if (board.every(v => v)) return { winner: null, line: [] };
    return null;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${result.winner} wins!`;
          scores[result.winner]++;
        } else {
          status.textContent = "It's a tie!";
          scores.T++;
        }
        scoreX.textContent = scores.X;
        scoreO.textContent = scores.O;
        scoreTie.textContent = scores.T;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    });
  });

  restartBtn.addEventListener('click', init);
  init();
</script>
</body>
</html>
