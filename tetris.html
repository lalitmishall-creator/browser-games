<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TETRIS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a12;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: monospace;
  color: #fff;
  overflow: hidden;
  user-select: none;
}
canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = 500, CH = 640;
canvas.width = CW; canvas.height = CH;

function resize() {
  const s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  canvas.style.width  = CW * s + 'px';
  canvas.style.height = CH * s + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Constants ────────────────────────────────────────────────────────────────
const COLS = 10, ROWS = 20, CELL = 26;
const BOARD_X = 97, BOARD_Y = 60;

// Points per lines cleared (×level)
const LINE_POINTS = [0, 100, 300, 500, 800];

// Drop intervals per level (ms)
function dropInterval(level) {
  return Math.max(80, 800 - (level - 1) * 70);
}

// ── Tetrominoes ───────────────────────────────────────────────────────────────
const PIECES = {
  I: { color: '#00cfcf', dark: '#007a7a', cells: [[0,1],[1,1],[2,1],[3,1]], w:4, h:3 },
  O: { color: '#cfcf00', dark: '#7a7a00', cells: [[0,0],[1,0],[0,1],[1,1]], w:2, h:2 },
  T: { color: '#aa00cf', dark: '#660080', cells: [[1,0],[0,1],[1,1],[2,1]], w:3, h:2 },
  S: { color: '#00cf00', dark: '#007a00', cells: [[1,0],[2,0],[0,1],[1,1]], w:3, h:2 },
  Z: { color: '#cf0000', dark: '#7a0000', cells: [[0,0],[1,0],[1,1],[2,1]], w:3, h:2 },
  J: { color: '#0055cf', dark: '#003380', cells: [[0,0],[0,1],[1,1],[2,1]], w:3, h:2 },
  L: { color: '#cf7700', dark: '#804900', cells: [[2,0],[0,1],[1,1],[2,1]], w:3, h:2 },
};
const PIECE_KEYS = Object.keys(PIECES);

function rotateCells(cells, w, h) {
  // Rotate 90° clockwise: (x,y) → (h-1-y, x), new dims = (h, w)
  return cells.map(([x, y]) => [h - 1 - y, x]);
}

function buildRotations(key) {
  const p = PIECES[key];
  const rots = [];
  let cells = p.cells, w = p.w, h = p.h;
  for (let r = 0; r < 4; r++) {
    rots.push({ cells, w, h });
    const nc = rotateCells(cells, w, h);
    [w, h] = [h, w];
    cells = nc;
  }
  return rots;
}

const ROTATIONS = {};
PIECE_KEYS.forEach(k => { ROTATIONS[k] = buildRotations(k); });

// Wall-kick offsets (SRS-lite): [right, left, up, down] tries
const KICKS = [
  [0, 0], [-1, 0], [1, 0], [-1, -1], [0, -1], [1, -1],
];

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, type, dur, vol = 0.25, freqEnd = null) {
  try {
    const a = ac();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, a.currentTime);
    if (freqEnd) o.frequency.linearRampToValueAtTime(freqEnd, a.currentTime + dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e){}
}
const sfx = {
  move:    () => tone(220, 'square', 0.04, 0.08),
  rotate:  () => tone(330, 'square', 0.05, 0.1),
  drop:    () => tone(100, 'square', 0.08, 0.2, 60),
  lock:    () => tone(180, 'sawtooth', 0.1, 0.2, 80),
  clear1:  () => tone(440, 'triangle', 0.2, 0.3),
  clear2:  () => { [440,554,659].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.15,.3),i*60)); },
  clear3:  () => { [440,554,659,880].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.15,.35),i*55)); },
  tetris:  () => { [262,330,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.12,.4),i*50)); },
  levelup: () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.2,.4),i*80)); },
  gameover:() => { [400,300,200,100].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',.3,.3),i*120)); },
  menu:    () => tone(440, 'triangle', 0.07, 0.15),
};

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) { keys[e.code] = true; onKeyDown(e.code); }
  // Prevent page scroll
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Game State ────────────────────────────────────────────────────────────────
const ST = { MENU: 0, PLAYING: 1, PAUSED: 2, LEVEL_UP: 3, GAME_OVER: 4 };
let state = ST.MENU;
let menuSel = 0;
const MENU_OPTS = ['START GAME', 'HIGH SCORES'];

let board, score, lines, level, highScore;
let current, currentRot, currentX, currentY, currentKey;
let held, holdUsed;
let nextBag, nextPiece;
let dropTimer, lockTimer, lockDelay;
let dasTimer, dasDir, dasActive;
let softDrop;
let levelUpTimer;
let gameOverReady;
let combo;
let particles = [];

const DAS_DELAY = 170, DAS_REPEAT = 50, LOCK_DELAY = 500;

// ── Board ─────────────────────────────────────────────────────────────────────
function emptyBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

// ── Bag randomizer ────────────────────────────────────────────────────────────
function newBag() {
  const bag = [...PIECE_KEYS];
  for (let i = bag.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bag[i], bag[j]] = [bag[j], bag[i]];
  }
  return bag;
}

function nextFromBag() {
  if (nextBag.length === 0) nextBag = newBag();
  return nextBag.shift();
}

// ── Piece Helpers ─────────────────────────────────────────────────────────────
function spawnPiece(key) {
  currentKey = key;
  currentRot = 0;
  const rot = ROTATIONS[key][0];
  currentX = Math.floor((COLS - rot.w) / 2);
  currentY = 0;
}

function getCells(key, rot, x, y) {
  return ROTATIONS[key][rot].cells.map(([cx, cy]) => [cx + x, cy + y]);
}

function isValid(key, rot, x, y) {
  for (const [cx, cy] of getCells(key, rot, x, y)) {
    if (cx < 0 || cx >= COLS || cy >= ROWS) return false;
    if (cy >= 0 && board[cy][cx]) return false;
  }
  return true;
}

function ghostY() {
  let gy = currentY;
  while (isValid(currentKey, currentRot, currentX, gy + 1)) gy++;
  return gy;
}

function lockPiece() {
  const cells = getCells(currentKey, currentRot, currentX, currentY);
  for (const [cx, cy] of cells) {
    if (cy < 0) { triggerGameOver(); return; }
    board[cy][cx] = PIECES[currentKey].color;
  }
  sfx.lock();
  spawnParticlesBurst(cells);
  clearLines();
  spawnNext();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== null)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      r++; // recheck same row index
    }
  }
  if (cleared === 0) { combo = 0; return; }

  combo++;
  const pts = LINE_POINTS[cleared] * level + (combo > 1 ? 50 * (combo - 1) * level : 0);
  score += pts;
  lines += cleared;

  // Play clear sound
  if (cleared === 4) sfx.tetris();
  else if (cleared === 3) sfx.clear3();
  else if (cleared === 2) sfx.clear2();
  else sfx.clear1();

  // Level up every 10 lines
  const newLevel = Math.floor(lines / 10) + 1;
  if (newLevel > level) {
    level = Math.min(newLevel, 15);
    sfx.levelup();
    state = ST.LEVEL_UP;
    levelUpTimer = 1.8;
  }
}

function spawnNext() {
  const key = nextPiece;
  nextPiece = nextFromBag();
  spawnPiece(key);
  holdUsed = false;
  dropTimer = 0;
  lockTimer = 0;
  lockDelay = false;

  if (!isValid(currentKey, currentRot, currentX, currentY)) {
    triggerGameOver();
  }
}

// ── Hold ──────────────────────────────────────────────────────────────────────
function doHold() {
  if (holdUsed) return;
  holdUsed = true;
  if (held === null) {
    held = currentKey;
    spawnNext();
  } else {
    const prev = held;
    held = currentKey;
    spawnPiece(prev);
    dropTimer = 0;
    lockTimer = 0;
    lockDelay = false;
  }
  sfx.rotate();
}

// ── Movement ──────────────────────────────────────────────────────────────────
function tryMove(dx, dy) {
  if (isValid(currentKey, currentRot, currentX + dx, currentY + dy)) {
    currentX += dx; currentY += dy;
    if (dx !== 0) { lockTimer = 0; }
    return true;
  }
  return false;
}

function tryRotate(dir) {
  const nextRot = (currentRot + dir + 4) % 4;
  for (const [kx, ky] of KICKS) {
    if (isValid(currentKey, nextRot, currentX + kx, currentY + ky)) {
      currentRot = nextRot;
      currentX += kx; currentY += ky;
      lockTimer = 0;
      sfx.rotate();
      return;
    }
  }
}

function hardDrop() {
  const gy = ghostY();
  const dist = gy - currentY;
  score += dist * 2;
  currentY = gy;
  sfx.drop();
  lockPiece();
}

// ── DAS (Delayed Auto Shift) ──────────────────────────────────────────────────
let dasIntervalTimer = 0;

function updateDAS(dt) {
  if (!dasDir) return;
  dasTimer += dt * 1000;
  if (!dasActive) {
    if (dasTimer >= DAS_DELAY) { dasActive = true; dasTimer = 0; dasIntervalTimer = DAS_REPEAT; }
  } else {
    dasIntervalTimer -= dt * 1000;
    if (dasIntervalTimer <= 0) {
      dasIntervalTimer = DAS_REPEAT;
      if (tryMove(dasDir, 0)) sfx.move();
    }
  }
}

// ── Game Init ─────────────────────────────────────────────────────────────────
function startGame() {
  board = emptyBoard();
  score = 0; lines = 0; level = 1;
  held = null; holdUsed = false;
  combo = 0;
  nextBag = newBag();
  nextPiece = nextFromBag();
  particles = [];
  dropTimer = 0; lockTimer = 0; lockDelay = false;
  dasTimer = 0; dasDir = 0; dasActive = false; dasIntervalTimer = 0;
  softDrop = false;
  spawnNext();
  state = ST.PLAYING;
}

function triggerGameOver() {
  sfx.gameover();
  const hs = parseInt(localStorage.getItem('tetrisHS') || '0');
  if (score > hs) localStorage.setItem('tetrisHS', String(score));
  highScore = Math.max(score, hs);
  gameOverReady = false;
  setTimeout(() => gameOverReady = true, 1200);
  state = ST.GAME_OVER;
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnParticlesBurst(cells) {
  cells.forEach(([cx, cy]) => {
    const px = BOARD_X + cx * CELL + CELL / 2;
    const py = BOARD_Y + cy * CELL + CELL / 2;
    for (let i = 0; i < 3; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 30 + Math.random() * 80;
      particles.push({
        x: px, y: py,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 40,
        r: 2 + Math.random() * 3,
        color: PIECES[currentKey].color,
        alpha: 1, decay: 2 + Math.random() * 2,
      });
    }
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 120 * dt;
    p.alpha -= p.decay * dt;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Key Handler ───────────────────────────────────────────────────────────────
function onKeyDown(code) {
  if (state === ST.MENU) {
    if (code === 'ArrowUp'   || code === 'KeyW') { menuSel = (menuSel - 1 + MENU_OPTS.length) % MENU_OPTS.length; sfx.menu(); }
    if (code === 'ArrowDown' || code === 'KeyS') { menuSel = (menuSel + 1) % MENU_OPTS.length; sfx.menu(); }
    if (code === 'Enter' || code === 'Space') activateMenu();
    return;
  }
  if (state === ST.GAME_OVER) {
    if (!gameOverReady) return;
    if (code === 'KeyR' || code === 'Enter') startGame();
    if (code === 'KeyM') { state = ST.MENU; menuSel = 0; }
    return;
  }
  if (state === ST.LEVEL_UP) return;
  if (state === ST.PAUSED) {
    if (code === 'KeyP' || code === 'Escape') { state = ST.PLAYING; sfx.menu(); }
    return;
  }
  if (state !== ST.PLAYING) return;

  if (code === 'ArrowLeft'  || code === 'KeyA') { if (tryMove(-1, 0)) sfx.move(); dasDir = -1; dasTimer = 0; dasActive = false; }
  if (code === 'ArrowRight' || code === 'KeyD') { if (tryMove(1, 0))  sfx.move(); dasDir = 1;  dasTimer = 0; dasActive = false; }
  if (code === 'ArrowUp'    || code === 'KeyW') tryRotate(1);
  if (code === 'KeyZ')                          tryRotate(-1);
  if (code === 'ArrowDown'  || code === 'KeyS') { softDrop = true; }
  if (code === 'Space')                         hardDrop();
  if (code === 'KeyC' || code === 'ShiftLeft' || code === 'ShiftRight') doHold();
  if (code === 'KeyP' || code === 'Escape')    { state = ST.PAUSED; sfx.menu(); }
}

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') { if (dasDir === -1) { dasDir = 0; dasActive = false; } }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { if (dasDir === 1)  { dasDir = 0; dasActive = false; } }
  if (e.code === 'ArrowDown'  || e.code === 'KeyS') softDrop = false;
});

function activateMenu() {
  sfx.menu();
  if (menuSel === 0) startGame();
  else if (menuSel === 1) { /* high scores shown in menu */ }
}

// ── Draw Helpers ──────────────────────────────────────────────────────────────
function drawCell(x, y, color, dark, alpha = 1, ghost = false) {
  const px = BOARD_X + x * CELL, py = BOARD_Y + y * CELL;
  ctx.globalAlpha = alpha;
  if (ghost) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px + 2, py + 2, CELL - 4, CELL - 4);
  } else {
    ctx.fillStyle = color;
    ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
    // Highlight top-left
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(px + 2, py + 2, CELL - 4, 3);
    ctx.fillRect(px + 2, py + 2, 3, CELL - 4);
    // Shadow bottom-right
    ctx.fillStyle = dark || 'rgba(0,0,0,0.35)';
    ctx.fillRect(px + 1, py + CELL - 4, CELL - 2, 3);
    ctx.fillRect(px + CELL - 4, py + 1, 3, CELL - 2);
  }
  ctx.globalAlpha = 1;
}

function drawMiniCell(px, py, color, size = 18) {
  const s = size;
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 1, s - 2, s - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(px + 2, py + 2, s - 4, 2);
  ctx.fillRect(px + 2, py + 2, 2, s - 4);
}

function drawPieceMini(key, ox, oy, size = 18) {
  const rot = ROTATIONS[key][0];
  const p = PIECES[key];
  const totalW = rot.w * size, totalH = rot.h * size;
  const sx = ox - totalW / 2, sy = oy - totalH / 2;
  rot.cells.forEach(([cx, cy]) => drawMiniCell(sx + cx * size, sy + cy * size, p.color, size));
}

// ── Draw Scanlines ────────────────────────────────────────────────────────────
function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  for (let y = 0; y < CH; y += 4) ctx.fillRect(0, y, CW, 2);
}

// ── Draw Background ───────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, CW, CH);
  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < CW; x += 20) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CH); ctx.stroke(); }
  for (let y = 0; y < CH; y += 20) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CW,y); ctx.stroke(); }
}

// ── Draw Board ────────────────────────────────────────────────────────────────
function drawBoard() {
  // Border glow
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = '#1a3a5a';
  ctx.lineWidth = 2;
  ctx.strokeRect(BOARD_X - 2, BOARD_Y - 2, COLS * CELL + 4, ROWS * CELL + 4);
  ctx.shadowBlur = 0;

  // Board fill
  ctx.fillStyle = '#07070f';
  ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X + c * CELL, BOARD_Y);
    ctx.lineTo(BOARD_X + c * CELL, BOARD_Y + ROWS * CELL);
    ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X, BOARD_Y + r * CELL);
    ctx.lineTo(BOARD_X + COLS * CELL, BOARD_Y + r * CELL);
    ctx.stroke();
  }

  // Placed cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) drawCell(c, r, board[r][c], darken(board[r][c]));
    }
  }

  // Ghost
  const gy = ghostY();
  if (gy !== currentY) {
    getCells(currentKey, currentRot, currentX, gy).forEach(([cx, cy]) => {
      if (cy >= 0) drawCell(cx, cy, PIECES[currentKey].color, null, 1, true);
    });
  }

  // Current piece
  getCells(currentKey, currentRot, currentX, currentY).forEach(([cx, cy]) => {
    if (cy >= 0) drawCell(cx, cy, PIECES[currentKey].color, PIECES[currentKey].dark);
  });
}

function darken(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const f = n => Math.max(0, n - 60).toString(16).padStart(2,'0');
  return `#${f(r)}${f(g)}${f(b)}`;
}

// ── Draw Sidebar ──────────────────────────────────────────────────────────────
function drawSidebar() {
  const rx = BOARD_X + COLS * CELL + 18;
  const lx = BOARD_X - 88;

  // ── RIGHT: NEXT + SCORE ──
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(rx, BOARD_Y, 80, 90);
  ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1;
  ctx.strokeRect(rx, BOARD_Y, 80, 90);

  ctx.fillStyle = '#888'; ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', rx + 40, BOARD_Y + 14);
  drawPieceMini(nextPiece, rx + 40, BOARD_Y + 55, 16);

  // Score panel
  const panels = [
    ['SCORE', String(score)],
    ['LINES', String(lines)],
    ['LEVEL', String(level)],
    ['COMBO', combo > 1 ? 'x' + combo : '-'],
  ];
  panels.forEach(([label, val], i) => {
    const py = BOARD_Y + 104 + i * 58;
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(rx, py, 80, 50);
    ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1;
    ctx.strokeRect(rx, py, 80, 50);
    ctx.fillStyle = '#666'; ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, rx + 40, py + 14);
    ctx.fillStyle = label === 'LEVEL' ? levelColor(level) : '#fff';
    ctx.font = `bold ${val.length > 6 ? 13 : 16}px monospace`;
    ctx.fillText(val, rx + 40, py + 36);
  });

  // High score
  const hs = localStorage.getItem('tetrisHS') || '0';
  ctx.fillStyle = '#444'; ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BEST', rx + 40, BOARD_Y + 340);
  ctx.fillStyle = '#666'; ctx.font = 'bold 11px monospace';
  ctx.fillText(hs, rx + 40, BOARD_Y + 354);

  // ── LEFT: HOLD ──
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(lx, BOARD_Y, 80, 90);
  ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1;
  ctx.strokeRect(lx, BOARD_Y, 80, 90);

  ctx.fillStyle = '#888'; ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HOLD', lx + 40, BOARD_Y + 14);
  if (held) {
    ctx.globalAlpha = holdUsed ? 0.35 : 1;
    drawPieceMini(held, lx + 40, BOARD_Y + 55, 16);
    ctx.globalAlpha = 1;
  }

  // Controls hint
  const controls = ['← → Move','↑ / Z Rotate','↓ Soft Drop','SPC Hard Drop','C Hold','P Pause'];
  ctx.fillStyle = '#2a2a3a';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  controls.forEach((t, i) => {
    ctx.fillText(t, lx + 40, BOARD_Y + 120 + i * 16);
  });

  ctx.textAlign = 'left';
}

function levelColor(lv) {
  if (lv <= 3) return '#33ff33';
  if (lv <= 6) return '#ffff00';
  if (lv <= 9) return '#ff8800';
  if (lv <= 12) return '#ff3333';
  return '#ff44ff';
}

// ── Draw Title ────────────────────────────────────────────────────────────────
function drawTitle() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 22px monospace';
  const grd = ctx.createLinearGradient(0, 14, 0, 38);
  grd.addColorStop(0, '#00cfcf');
  grd.addColorStop(1, '#0055cf');
  ctx.fillStyle = grd;
  ctx.fillText('TETRIS', CW / 2, 38);
  ctx.textAlign = 'left';
}

// ── Draw Menu ─────────────────────────────────────────────────────────────────
function drawMenu() {
  drawBackground();
  drawScanlines();

  // Animated logo
  ctx.textAlign = 'center';
  const t = Date.now() / 1000;
  const colors = ['#cf0000','#cf7700','#cfcf00','#00cf00','#00cfcf','#0055cf','#aa00cf'];
  'TETRIS'.split('').forEach((ch, i) => {
    ctx.fillStyle = colors[i % colors.length];
    ctx.font = `bold ${62 + Math.sin(t * 2 + i * 0.8) * 4}px monospace`;
    ctx.fillText(ch, 170 + i * 28, 140 + Math.sin(t * 1.5 + i) * 8);
  });

  ctx.fillStyle = '#444'; ctx.font = '13px monospace';
  ctx.fillText('CLASSIC BLOCK PUZZLE', CW / 2, 168);

  // Options
  MENU_OPTS.forEach((opt, i) => {
    const y = 250 + i * 56;
    const sel = menuSel === i;
    if (sel) {
      ctx.fillStyle = 'rgba(0,180,255,0.12)';
      ctx.fillRect(CW/2 - 130, y - 28, 260, 40);
      ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 1.5;
      ctx.strokeRect(CW/2 - 130, y - 28, 260, 40);
    }
    ctx.fillStyle = sel ? '#00cfff' : '#666';
    ctx.font = `bold ${sel ? 20 : 17}px monospace`;
    ctx.fillText(opt, CW / 2, y);
  });

  // High score
  const hs = localStorage.getItem('tetrisHS') || '0';
  ctx.fillStyle = '#333'; ctx.font = '12px monospace';
  ctx.fillText(`BEST SCORE: ${hs}`, CW / 2, 390);

  // Controls
  ctx.fillStyle = '#2a2a3a'; ctx.font = '11px monospace';
  ctx.fillText('↑↓ Navigate   ENTER / SPACE Select', CW / 2, CH - 24);

  ctx.textAlign = 'left';
}

// ── Draw Game ─────────────────────────────────────────────────────────────────
function drawGame() {
  drawBackground();
  drawBoard();
  drawParticles();
  drawSidebar();
  drawTitle();
  drawScanlines();
}

// ── Draw Paused ───────────────────────────────────────────────────────────────
function drawPaused() {
  drawGame();
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, CW, CH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff'; ctx.font = 'bold 40px monospace';
  ctx.fillText('PAUSED', CW / 2, CH / 2 - 20);
  ctx.fillStyle = '#555'; ctx.font = '15px monospace';
  ctx.fillText('P or ESC to resume', CW / 2, CH / 2 + 20);
  ctx.textAlign = 'left';
}

// ── Draw Level Up ─────────────────────────────────────────────────────────────
function drawLevelUp() {
  drawGame();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, CW, CH);
  const t = 1 - levelUpTimer / 1.8;
  ctx.globalAlpha = Math.min(1, t * 4);
  ctx.textAlign = 'center';
  ctx.fillStyle = levelColor(level);
  ctx.font = `bold ${36 + Math.sin(t * Math.PI) * 10}px monospace`;
  ctx.fillText(`LEVEL ${level}!`, CW / 2, CH / 2 - 10);
  ctx.fillStyle = '#aaa'; ctx.font = '16px monospace';
  ctx.fillText('SPEED UP!', CW / 2, CH / 2 + 24);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ── Draw Game Over ────────────────────────────────────────────────────────────
function drawGameOver() {
  drawBackground();
  drawScanlines();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff2222'; ctx.font = 'bold 52px monospace';
  ctx.fillText('GAME', CW / 2, CH / 2 - 70);
  ctx.fillText('OVER', CW / 2, CH / 2 - 10);

  ctx.fillStyle = '#ffaa00'; ctx.font = 'bold 22px monospace';
  ctx.fillText(`SCORE: ${score}`, CW / 2, CH / 2 + 44);

  ctx.fillStyle = '#888'; ctx.font = '16px monospace';
  ctx.fillText(`LINES: ${lines}   LEVEL: ${level}`, CW / 2, CH / 2 + 72);
  ctx.fillText(`BEST: ${highScore}`, CW / 2, CH / 2 + 96);

  if (score >= highScore && highScore > 0) {
    const blink = Math.floor(Date.now() / 400) % 2 === 0;
    ctx.fillStyle = blink ? '#ffff00' : '#886600';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('NEW HIGH SCORE!', CW / 2, CH / 2 + 124);
  }

  if (gameOverReady) {
    ctx.fillStyle = '#fff'; ctx.font = '15px monospace';
    ctx.fillText('[ENTER / R] RESTART   [M] MENU', CW / 2, CH / 2 + 162);
  }
  ctx.textAlign = 'left';
}

// ── Game Loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, CW, CH);

  if (state === ST.MENU) {
    drawMenu();
  } else if (state === ST.PLAYING) {
    update(dt);
    drawGame();
  } else if (state === ST.PAUSED) {
    drawPaused();
  } else if (state === ST.LEVEL_UP) {
    updateLevelUp(dt);
    drawLevelUp();
  } else if (state === ST.GAME_OVER) {
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

function update(dt) {
  updateDAS(dt);
  updateParticles(dt);

  // Soft drop
  const interval = dropInterval(level);
  const effInterval = softDrop ? Math.min(interval, 50) : interval;

  dropTimer += dt * 1000;
  if (dropTimer >= effInterval) {
    dropTimer = 0;
    if (!tryMove(0, 1)) {
      // Can't drop — start lock delay
      if (!lockDelay) { lockDelay = true; lockTimer = 0; }
    } else {
      lockDelay = false;
      lockTimer = 0;
      if (softDrop) score += 1;
    }
  }

  // Lock delay
  if (lockDelay) {
    lockTimer += dt * 1000;
    if (lockTimer >= LOCK_DELAY) {
      lockDelay = false;
      lockTimer = 0;
      lockPiece();
    }
  }
}

function updateLevelUp(dt) {
  updateParticles(dt);
  levelUpTimer -= dt;
  if (levelUpTimer <= 0) state = ST.PLAYING;
}

// ── Start ─────────────────────────────────────────────────────────────────────
highScore = parseInt(localStorage.getItem('tetrisHS') || '0');
requestAnimationFrame(loop);
</script>
